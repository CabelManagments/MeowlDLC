plugins {
    id 'java'
}

version = '1.0.0'
group = 'com.yourcheat'
archivesBaseName = 'yourcheat'

java {
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8
}

// Говорим gradle что исходники лежат прямо в корне репо
sourceSets {
    main {
        java {
            srcDirs = ['.']
            exclude 'build/**'
            exclude '.github/**'
            exclude 'gradle/**'
        }
    }
}

repositories {
    maven { url = 'https://maven.minecraftforge.net' }
    mavenCentral()
}

configurations {
    forgeCompile
    compileOnly.extendsFrom forgeCompile
}

dependencies {
    forgeCompile 'net.minecraftforge:forge:1.16.5-36.2.34:universal'
}

jar {
    manifest {
        attributes([
            'Specification-Title'    : 'yourcheat',
            'Implementation-Title'   : project.name,
            'Implementation-Version' : project.version,
        ])
    }
}
