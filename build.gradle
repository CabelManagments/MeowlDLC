plugins {
    id 'java'
}

version = '1.0.0'
group = 'com.yourcheat'
archivesBaseName = 'yourcheat'

java {
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8
}

sourceSets {
    main {
        java {
            srcDirs = ['.']
            exclude 'build/**'
            exclude '.github/**'
            exclude 'gradle/**'
        }
    }
}

repositories {
    maven { url = 'https://libraries.minecraft.net' }
    maven { url = 'https://maven.minecraftforge.net' }
    mavenCentral()
}

configurations {
    mcCompile
    compileOnly.extendsFrom mcCompile
}

dependencies {
    // Forge universal (содержит Forge классы + EventBus)
    mcCompile 'net.minecraftforge:forge:1.16.5-36.2.34:universal'
    // Minecraft client jar (содержит net.minecraft.*, com.mojang.*)
    mcCompile 'com.mojang:minecraft:1.16.5:client'
    // LWJGL (GL11, GLFW и т.д.)
    mcCompile 'org.lwjgl:lwjgl:3.2.2'
    mcCompile 'org.lwjgl:lwjgl-opengl:3.2.2'
    mcCompile 'org.lwjgl:lwjgl-glfw:3.2.2'
}

jar {
    manifest {
        attributes([
            'Specification-Title'    : 'yourcheat',
            'Implementation-Title'   : project.name,
            'Implementation-Version' : project.version,
        ])
    }
}
