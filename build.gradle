plugins {
    id 'java'
}

version = '1.0.0'
group = 'com.yourcheat'
archivesBaseName = 'yourcheat'

java {
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8
}

sourceSets {
    main {
        java {
            srcDirs = ['.']
            exclude 'build/**'
            exclude '.github/**'
            exclude 'gradle/**'
            exclude 'libs/**'
        }
    }
}

repositories {
    maven { url = 'https://maven.minecraftforge.net' }
    mavenCentral()
}

configurations {
    mcCompile
    compileOnly.extendsFrom mcCompile
}

dependencies {
    // Forge universal
    mcCompile 'net.minecraftforge:forge:1.16.5-36.2.34:universal'
    // LWJGL
    mcCompile 'org.lwjgl:lwjgl:3.2.2'
    mcCompile 'org.lwjgl:lwjgl-opengl:3.2.2'
    mcCompile 'org.lwjgl:lwjgl-glfw:3.2.2'
    // Minecraft client jar (скачивается в workflow в папку libs/)
    mcCompile fileTree(dir: 'libs', include: '*.jar')
}

jar {
    manifest {
        attributes([
            'Specification-Title'    : 'yourcheat',
            'Implementation-Title'   : project.name,
            'Implementation-Version' : project.version,
        ])
    }
}
