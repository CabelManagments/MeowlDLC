name: Build Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Convert MP3 sounds to OGG
        run: |
          for f in resources/assets/yourcheat/sounds/*.mp3; do
            [ -f "$f" ] || continue
            out="${f%.mp3}.ogg"
            ffmpeg -y -i "$f" -c:a libvorbis -q:a 4 "$out" && rm "$f"
            echo "Converted $f -> $out"
          done

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://github.com/gradle/gradle/raw/v8.8.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-fabric-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-fabric-

      - name: Build with Gradle
        run: ./gradlew build --no-daemon
        env:
          GRADLE_OPTS: "-Xmx2g"

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: meowldlc-jar
          path: build/libs/*.jar
          if-no-files-found: error
