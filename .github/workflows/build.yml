name: Build Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://github.com/gradle/gradle/raw/v6.8.3/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Pre-download Mojang mappings for ForgeGradle
        run: |
          # ForgeGradle кладёт маппинги сюда
          MCP_DIR="$HOME/.gradle/caches/forge_gradle/mcp_repo/de/oceanlabs/mcp/mcp_config/1.16.5"
          mkdir -p "$MCP_DIR"
          # Скачиваем mcp_config zip с Forge maven
          curl -L "https://maven.minecraftforge.net/de/oceanlabs/mcp/mcp_config/1.16.5/mcp_config-1.16.5.zip" \
            -o "$MCP_DIR/mcp_config-1.16.5.zip"
          # Распаковываем tsrg файл
          cd "$MCP_DIR"
          unzip -o mcp_config-1.16.5.zip "config/joined.tsrg" 2>/dev/null || true
          # ForgeGradle ищет именно этот файл
          cp config/joined.tsrg mcp_config-1.16.5-obf_to_srg.tsrg 2>/dev/null || true
          ls -la "$MCP_DIR"

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build with Gradle
        run: ./gradlew jar --no-daemon
        env:
          GRADLE_OPTS: "-Xmx3g"

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: yourcheat-jar
          path: build/libs/*.jar
          if-no-files-found: warn
